<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glacier</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    color: white;
    overflow-x: hidden;
    background: #050b18;
}

/* ===== ICE GRADIENT BACKGROUND ===== */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #1b6cff33, transparent 40%),
                radial-gradient(circle at bottom, #00e0ff22, transparent 50%),
                #050b18;
    z-index: -2;
}

/* ===== FLOATING PARTICLES ===== */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(173, 216, 255, 0.8);
    border-radius: 50%;
    animation: floatUp linear infinite;
    box-shadow: 0 0 10px rgba(173,216,255,0.8);
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 0;
    }
    10% { opacity: 1; }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

/* ===== MAIN LAYOUT ===== */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 80px 20px;
    text-align: center;
}

/* ===== TITLE ===== */
h1 {
    font-size: 4rem;
    font-weight: 800;
    background: linear-gradient(90deg, #7dd3fc, #38bdf8, #0ea5e9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    from { filter: drop-shadow(0 0 10px #38bdf8); }
    to { filter: drop-shadow(0 0 25px #0ea5e9); }
}

p {
    margin-top: 10px;
    color: #bcdcff;
}

/* ===== GLASS CARD ===== */
.card {
    margin-top: 50px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 40px rgba(56,189,248,0.3);
}

/* ===== BUTTON ===== */
.btn {
    margin-top: 20px;
    padding: 12px 22px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    color: white;
    background: linear-gradient(90deg, #38bdf8, #0ea5e9);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(56,189,248,0.6);
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 40px;
}

.box {
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 25px rgba(125,211,252,0.2);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
    <h1>GLACIER</h1>
    <p>Ultra-premium animated landing page template</p>

    <div class="card">
        <h2>Welcome</h2>
        <p>A clean, glass-style interface with animated ice particles.</p>
        <button class="btn">Get Started</button>
    </div>

    <div class="grid">
        <div class="box">⚡ Fast</div>
        <div class="box">❄️ Ice UI</div>
        <div class="box">✨ Premium Feel</div>
    </div>
</div>

<script>
/* ===== CREATE PARTICLES ===== */
for (let i = 0; i < 60; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 7) + "s";
    p.style.opacity = Math.random();
    document.body.appendChild(p);
}
</script>

</body>
</html>
